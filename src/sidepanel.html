<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitScope</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">GitHub Analyzer</p>
          <h1>GitScope</h1>
        </div>
        <div class="header-actions">
          <button id="copy-report-button" class="button button-primary" type="button">
            Copy Report
          </button>
          <button id="compare-button" class="button button-secondary" type="button">
            Compare
          </button>
          <button
            id="settings-button"
            class="icon-button"
            type="button"
            aria-label="Open settings"
            title="Settings"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 8.75a3.25 3.25 0 1 0 0 6.5 3.25 3.25 0 0 0 0-6.5Zm8.06 2.31-1.43-.24a6.83 6.83 0 0 0-.62-1.49l.84-1.18a.9.9 0 0 0-.09-1.14l-1.78-1.78a.9.9 0 0 0-1.14-.09l-1.18.84a6.82 6.82 0 0 0-1.49-.62l-.24-1.43A.9.9 0 0 0 12.04 3h-2.08a.9.9 0 0 0-.89.75l-.24 1.43c-.52.14-1.02.35-1.49.62l-1.18-.84a.9.9 0 0 0-1.14.09L3.24 6.83a.9.9 0 0 0-.09 1.14L4 9.15c-.27.47-.48.97-.62 1.49l-1.43.24a.9.9 0 0 0-.75.89v2.08c0 .44.32.82.75.89l1.43.24c.14.52.35 1.02.62 1.49l-.84 1.18a.9.9 0 0 0 .09 1.14l1.78 1.78a.9.9 0 0 0 1.14.09l1.18-.84c.47.27.97.48 1.49.62l.24 1.43c.07.43.45.75.89.75h2.08a.9.9 0 0 0 .89-.75l.24-1.43c.52-.14 1.02-.35 1.49-.62l1.18.84a.9.9 0 0 0 1.14-.09l1.78-1.78a.9.9 0 0 0 .09-1.14l-.84-1.18c.27-.47.48-.97.62-1.49l1.43-.24a.9.9 0 0 0 .75-.89v-2.08a.9.9 0 0 0-.75-.89Z"
              />
            </svg>
          </button>
        </div>
      </header>

      <main id="content" class="content" aria-live="polite"></main>
    </div>

    <div id="rate-limit-display" class="rate-limit-display">
      <span id="rate-limit-label">Rate limit: --</span>
    </div>

    <div id="settings-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-settings="true"></div>
      <section class="modal-panel" aria-labelledby="settings-title" role="dialog">
        <div class="modal-header">
          <h2 id="settings-title">Settings</h2>
          <button class="icon-button" id="close-settings-button" type="button" aria-label="Close settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19l5.6-5.6 5.6 5.6 1.4-1.4-5.6-5.6L19 6.4 17.6 5 12 10.6 6.4 5Z" />
            </svg>
          </button>
        </div>
        <label class="field" for="token-input">
          <span>GitHub Personal Access Token</span>
          <textarea
            id="token-input"
            rows="4"
            placeholder="Paste a token to increase API rate limits."
            spellcheck="false"
          ></textarea>
        </label>
        <p class="field-hint">
          Stored in <code>chrome.storage.sync</code>. Leave blank to use unauthenticated API requests.
        </p>
        <div class="modal-actions">
          <button id="clear-token-button" class="button button-secondary" type="button">Clear</button>
          <button id="save-token-button" class="button button-primary" type="button">Save</button>
        </div>
      </section>
    </div>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
